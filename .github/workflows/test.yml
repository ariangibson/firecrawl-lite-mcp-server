name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Run JS actions on the Node.js 24 runtime to clear the Node 20 deprecation
  # warnings (the action major versions still bundle Node 20 until upstream
  # ships Node 24 builds). See GitHub changelog 2025-09-19.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm

    # Skip the postinstall Chromium download — the unit tests don't need a browser
    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Type-check
      run: npm run lint

    - name: Run tests
      run: npm test
